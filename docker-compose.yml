services:
  postgres:
    image: postgres:17-alpine
    container_name: cadastro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cadastro_user
      POSTGRES_PASSWORD: cadastro_dev_pass
      POSTGRES_DB: cadastro
    ports:
      - "5432:5432"
    volumes:
      - cadastro_postgres_data:/var/lib/postgresql/data
    healthcheck:
       test: ["CMD-SHELL", "pg_isready -U cadastro_user -d cadastro"]
       interval: 5s
       timeout: 5s
       retries: 20

  redis:
    image: redis:7-alpine
    container_name: cadastro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cadastro_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: cadastro_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cadastro_user:cadastro_dev_pass@postgres:5432/cadastro?schema=public
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: cadastro-dev-jwt-secret-troque-em-producao-use-openssl-rand-hex-32
      FRONTEND_ORIGIN: http://localhost:5173
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
    cadastro_postgres_data:
    cadastro_redis_data:

